<article class="article article--{{ .Type }} grid__full">
  <header class="article__header">
    {{- if not (eq .Type "page") }}
    <p><time datetime='{{ .Date.Format "2006-01-02" }}'>{{ .Date | time.Format ":date_long" }}</time></p>
    {{- end }}

    <h1>{{ .Title | safeHTML }}</h1>
  </header>

  {{- partial "headline-hash" . -}}

  {{- if eq .Type "book" }}
    {{- if .Params.rate }}
      {{- partial "rate" . -}}
    {{- end }}
  {{- end }}
</article>
